<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
    <style type="text/css">
        /* Style for textbox where there is no content */
        .td15
        {
            width: 300px;
            vertical-align: top;
            text-align: right;
            font-family: Verdana;
            font-size: 14px;
            font-weight: normal;
        }
        
        .td19
        {
            width: 283px;
            vertical-align: top;
            font-weight: bold;
            min-height: 26px;
        }
        
        .paneldisplay
        {
            /*height: 680px;*/
        }
        
        .panelpartial
        {
            width: 936px; /*border: 2px solid #01a7de;*/
            border-top: 2px solid #0072CC;
            margin-bottom: 30px;
        }
        
        .contentinPanel
        {
            margin-top: 12px;
            margin-left: 25px;
        }
        
        .tabrow
        {
            height: 30px;
        }
        
        .paneldisplay h3
        {
            width: 938px;
            height: 27px;
        }
        
        .colorPrinciple
        {
            color: #0072CC;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="pnldisplay" class="paneldisplay">
        <h3>
            <span id="Span2" class="colorPrinciple">Contact</span>
        </h3>
        <div id="Div2" class="panelpartial">
            <table class="contentinPanel">
                <tr class="tabrow">
                    <td class="td15">
                        <span id="Span3">Date de création : </span>
                    </td>
                    <td class="td19">
                        <span id="Span4">#d_creation#</span>
                    </td>
                    <td class="td15">
                        <span id="Span5" style="color: #2D6CDF">Code de message :</span>
                    </td>
                    <td class="td19">
                        <span id="Span6" style="color: #2D6CDF">#Code#</span>
                    </td>
                </tr>
                <tr class="tabrow">
                    <td class="td15">
                        <span id="Span19">Raison sociale : </span>
                    </td>
                    <td class="td19" colspan="3">
                        <span id="Span20">#CompanyName#</span>
                    </td>
                </tr>
                <tr class="tabrow">
                    <td class="td15">
                        <span id="Span7">Prénom : </span>
                    </td>
                    <td class="td19">
                        <span id="Span8">#Name#</span>
                    </td>
                    <td class="td15">
                        <span id="Span9">Nom : </span>
                    </td>
                    <td class="td19">
                        <span id="Span10">#Lastname#</span>
                    </td>
                </tr>
                <tr class="tabrow">
                    <td class="td15">
                        <span id="Span3">Téléphone : </span>
                    </td>
                    <td class="td19">
                        <span id="Span4"><a href="tel:#Telephone#">#Telephone#</a></span>
                    </td>
                    <td class="td15">
                        <span id="Span11">Email : </span>
                    </td>
                    <td class="td19">
                        <span id="Span12">#Email#</span>
                    </td>
                </tr>
                <tr class="tabrow">
                    <td class="td15">
                        <span id="Span13">Adresse : </span>
                    </td>
                    <td class="td19">
                        <span id="Span14">#Address#</span>
                    </td>
                    <td class="td15">
                        <span id="Span15">Code postal : </span>
                    </td>
                    <td class="td19">
                        <span id="Span16">#PostCode#</span>
                    </td>
                </tr>
                <tr class="tabrow">
                    <td class="td15">
                        <span id="Span17">Ville : </span>
                    </td>
                    <td class="td19" colspan="3">
                        <span id="Span18">#City#</span>
                    </td>
                </tr>
            </table>
        </div>
        <h3>
            <span id="Span1" class="colorPrinciple">Message</span>
        </h3>
        <div id="Div1" class="panelpartial">
            <table class="contentinPanel">
                <tr class="tabrow">
                    <td class="td15">
                        <span id="Label30">Subjet : </span>
                    </td>
                    <td class="td19">
                        <span id="">#Subject#</span>
                    </td>
                    <td class="td15">
                    </td>
                    <td class="td19">
                    </td>
                </tr>
                <tr class="tabrow">
                    <td class="td15">
                        <span id="Label62">Message : </span>
                    </td>
                    <td class="td19" colspan="3">
                        <span id="">#Message#</span>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
