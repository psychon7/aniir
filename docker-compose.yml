version: '3.8'

services:
  # ============================================================================
  # Redis - Cache & Session Store
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: axtecherp-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-2@24Courtry} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-2@24Courtry}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - erp-network

  # ============================================================================
  # MinIO - S3-compatible Object Storage
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: axtecherp-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - erp-network

volumes:
  redis_data:
  minio_data:

networks:
  erp-network:
    driver: bridge
