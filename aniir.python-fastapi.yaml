version: 1
repo:
  id: "AXTECH-Shop/ERP"
  default_branch: "main"

auth:
  profile: "axtech"

ai:
  # mode options: codex_cloud_subscription | codex_local_subscription | openai_api
  mode: "codex_cloud_subscription"
  model: "gpt-5-codex"
  timeout_seconds: 0
  progress_interval_seconds: 10
  openai:
    api_key_env: "OPENAI_API_KEY"

sentry:
  api_token_env: "SENTRY_TOKEN"
  api_host_env: "SENTRY_API_HOST"
  org_slug: "axtech-jk"
  project: "python-fastapi"
  status: "unresolved"
  limit: 20
  severity_threshold: "error"

verification:
  mode: full

sync:
  max_prs_per_run: 1
  state_path: ".aniir/sync-state.json"
