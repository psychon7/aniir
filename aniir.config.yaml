# ── Aniir example configuration ──────────────────────────────────────────
#
# Copy this file into your project repo (e.g. .aniir/config.yaml) and
# customise the values for your organisation and Sentry project.
#
# In CI, set secrets via environment variables:
#   SENTRY_TOKEN, OPENAI_API_KEY, GITHUB_TOKEN
#
# Locally, run `npx aniir connect --profile <name>` to save tokens once.
# ─────────────────────────────────────────────────────────────────────────

version: 1
repo:
  id: "owner/repo-name"               # GitHub owner/repo (auto-detected in CI via GITHUB_REPOSITORY)
  default_branch: "main"

auth:
  profile: "default"                   # credentials profile from ~/.aniir/credentials.json

ai:
  # codex_cloud_subscription → interactive login (local dev)
  # openai_api               → API key (CI, recommended)
  # In CI, aniir auto-switches to openai_api when OPENAI_API_KEY is set.
  mode: "openai_api"
  model: "gpt-5-codex"
  timeout_seconds: 300                 # 0 = no timeout
  openai:
    api_key_env: "OPENAI_API_KEY"

sentry:
  api_token_env: "SENTRY_TOKEN"
  api_host_env: "SENTRY_API_HOST"
  org_slug: "your-sentry-org"
  project: "your-sentry-project"
  status: "unresolved"
  limit: 20
  severity_threshold: "error"

verification:
  mode: full

sync:
  max_prs_per_run: 3
  state_path: ".aniir/sync-state.json"

prompts:
  triage:
    user_instructions: ""
  investigate_fix:
    user_instructions: ""
  verify:
    user_instructions: ""
  pr_body:
    user_instructions: ""

notifications:
  slack:
    enabled: false
    channel: ""
