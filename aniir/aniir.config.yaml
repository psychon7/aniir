version: 1
repo:
  id: "axtech/erp2025"
  default_branch: "main"

ai:
  # mode options: codex_cloud_subscription | codex_local_subscription | openai_api
  mode: "codex_cloud_subscription"
  model: "gpt-5-codex"
  openai:
    api_key_env: "OPENAI_API_KEY"

sentry:
  api_token_env: "SENTRY_TOKEN"
  api_host_env: "SENTRY_API_HOST"
  org_slug: "axtech"
  project: "erp2025-prod"
  status: "unresolved"
  limit: 20
  severity_threshold: "error"

webhooks:
  secrets:
    sentry: "replace-with-sentry-secret"
    pagerduty: "replace-with-pagerduty-secret"
    datadog: "replace-with-datadog-secret"
    grafana: "replace-with-grafana-secret"
    opsgenie: "replace-with-opsgenie-secret"
    incidentio: "replace-with-incidentio-secret"
    signoz: "replace-with-signoz-secret"

memory:
  path: ".aniir/known-issues.json"
  state_branch: "aniir-state"

commands:
  test:
    - "npm test"

playwright:
  enabled: true
  command: "npx playwright test tests/auth-flow.api.spec.ts"

verification:
  mode: full
  allow_fix_only_for:
    - docs
  force_full_for:
    - auth
    - payments

prompts:
  triage:
    user_instructions: ""
  investigate_fix:
    user_instructions: ""
  verify:
    user_instructions: ""
  pr_body:
    user_instructions: ""

pr:
  labels:
    - aniir
    - auto-fix

notifications:
  slack:
    enabled: true
    channel: "#engineering-alerts"
