version: 1
repo:
  id: "axtech/erp2025"
  default_branch: "main"

sentry:
  project: "erp2025-prod"
  severity_threshold: "error"

webhooks:
  secrets:
    sentry: "replace-with-sentry-secret"
    pagerduty: "replace-with-pagerduty-secret"
    datadog: "replace-with-datadog-secret"
    grafana: "replace-with-grafana-secret"
    opsgenie: "replace-with-opsgenie-secret"
    incidentio: "replace-with-incidentio-secret"
    signoz: "replace-with-signoz-secret"

memory:
  path: ".aniir/known-issues.json"
  state_branch: "aniir-state"

commands:
  test:
    - "npm test"

playwright:
  enabled: true
  command: "npx playwright test tests/auth-flow.api.spec.ts"

verification:
  mode: full
  allow_fix_only_for:
    - docs
  force_full_for:
    - auth
    - payments

pr:
  labels:
    - aniir
    - auto-fix

notifications:
  slack:
    enabled: true
    channel: "#engineering-alerts"
