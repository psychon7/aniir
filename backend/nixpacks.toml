# Nixpacks configuration for FastAPI backend

[phases.setup]
nixPkgs = ["python311", "gcc", "freetds"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install pymssql",
    "pip install -e ."
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port 8001"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONPATH = "/app"
